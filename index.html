<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dad">
      <div class="boardcomp">
        <div class="container1">
          <div class="container">
            <h1>To-Do list</h1>
            <div class="input-container">
              <div class="container2">
                <input
                  type="text"
                  id="taskInput"
                  placeholder="Add a new task ..."
                />
              </div>

              <div class="Button"><button onclick="addTask()">Add</button></div>
            </div>
            <div class="filter-container">
              <div class="All">
                <button onclick="filtertodo('ALL')"><p>ALL</p></button>
              </div>

              <div class="Active">
                <button onclick="filtertodo('Active')"><p>Active</p></button>
              </div>
              <div class="complated">
                <button onclick="filtertodo('Complated')">Complated</button>
              </div>
            </div>
          </div>

          <div id="texts2">
            <p>No tasks yet. Add one above!</p>
          </div>
        </div>
        <div class="texts">
          <div class="Power"><p>Powered by</p></div>
          <div class="Pinecone"><p>Pinecone academy</p></div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
